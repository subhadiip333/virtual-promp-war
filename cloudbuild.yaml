steps:
  # Step 1: Install dependencies
  - name: 'node:20-alpine'
    entrypoint: 'npm'
    args: ['ci']

  # Step 2: Run tests
  - name: 'node:20-alpine'
    entrypoint: 'npx'
    args: ['vitest', 'run']

  # Step 3: Build the Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args: [
      'build',
      '-t', '$_REGION-docker.pkg.dev/$PROJECT_ID/$_REPOSITORY_NAME/$_IMAGE_NAME:$COMMIT_SHA',
      '.'
    ]

  # Step 4: Push the Docker image to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: [
      'push',
      '$_REGION-docker.pkg.dev/$PROJECT_ID/$_REPOSITORY_NAME/$_IMAGE_NAME:$COMMIT_SHA'
    ]

  # Step 5: Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - '$_SERVICE_NAME'
      - '--image'
      - '$_REGION-docker.pkg.dev/$PROJECT_ID/$_REPOSITORY_NAME/$_IMAGE_NAME:$COMMIT_SHA'
      - '--region'
      - '$_REGION'
      - '--port'
      - '8080'
      - '--allow-unauthenticated'

substitutions:
  _REGION: 'us-central1'
  _REPOSITORY_NAME: 'YOUR_REPOSITORY_NAME'
  _IMAGE_NAME: 'matadata-app'
  _SERVICE_NAME: 'matadata-service'

images:
  - '$_REGION-docker.pkg.dev/$PROJECT_ID/$_REPOSITORY_NAME/$_IMAGE_NAME:$COMMIT_SHA'

options:
  logging: CLOUD_LOGGING_ONLY
